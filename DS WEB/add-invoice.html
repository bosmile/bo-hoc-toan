<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Hóa Đơn Mới</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i> Quay lại
            </button>
            <h1><i class="fas fa-plus-circle"></i> Thêm Hóa Đơn Mới</h1>
        </header>

        <main class="main-content add-invoice">
            <div class="invoice-form">
                <!-- Thông tin chung -->
                <section class="form-section">
                    <h2><i class="fas fa-info-circle"></i> Thông tin chung</h2>
                    
                    <div class="form-group">
                        <label for="category"><i class="fas fa-tags"></i> Phân loại *</label>
                        <select id="category" required>
                            <option value="">Chọn loại chi tiêu</option>
                            <option value="BIGC">BIGC</option>
                            <option value="SP/LZD">SP/LZD</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="date"><i class="fas fa-calendar"></i> Ngày mua *</label>
                        <input type="date" id="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="store"><i class="fas fa-store"></i> Tên cửa hàng</label>
                        <input type="text" id="store" placeholder="Nhập tên cửa hàng...">
                    </div>
                </section>

                <!-- Chi tiết sản phẩm -->
                <section class="form-section">
                    <h2><i class="fas fa-list-alt"></i> Chi tiết hàng hóa</h2>
                    <div class="products-container" id="productsContainer">
                        <!-- Sản phẩm sẽ được thêm động ở đây -->
                        <div class="product-item" data-index="0">
                            <div class="product-row">
                                <div class="form-group">
                                    <label>Tên hàng hóa *</label>
                                    <input type="text" class="product-name" placeholder="Ví dụ: Cà phê sữa đá" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>Số lượng *</label>
                                    <input type="number" class="product-quantity" value="1" min="1" required oninput="calculateProductTotal(0)">
                                </div>
                                
                                <div class="form-group">
                                    <label>Đơn giá (₫) *</label>
                                    <input type="number" class="product-price" placeholder="0" min="0" required oninput="calculateProductTotal(0)">
                                </div>
                                
                                <div class="form-group">
                                    <label>Thành tiền (₫)</label>
                                    <input type="text" class="product-total" value="0 ₫" readonly>
                                </div>
                                
                                <button type="button" class="remove-product-btn" onclick="removeProduct(0)" style="display: none;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" class="add-product-btn" onclick="addProductRow()">
                        <i class="fas fa-plus"></i> Thêm sản phẩm
                    </button>
                    
                    <div class="total-section">
                        <div class="total-row">
                            <span>Tổng cộng:</span>
                            <span id="grandTotal">0 ₫</span>
                        </div>
                    </div>
                </section>

                <!-- Ảnh hóa đơn -->
                <section class="form-section">
                    <h2><i class="fas fa-receipt"></i> Hình ảnh hóa đơn (tùy chọn)</h2>
                    
                    <div class="upload-area" id="uploadArea">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Kéo thả ảnh vào đây hoặc nhấn để chọn</p>
                        <input type="file" id="imageUpload" accept="image/*" hidden>
                        <button type="button" class="upload-btn" onclick="document.getElementById('imageUpload').click()">
                            Chọn ảnh
                        </button>
                    </div>
                    
                    <div class="image-preview" id="imagePreview" style="display: none;">
                        <img id="previewImage" src="" alt="Preview">
                        <button type="button" class="remove-image" onclick="removeImage()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </section>

                <!-- Nút lưu -->
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="window.history.back()">
                        Hủy
                    </button>
                    <button type="button" class="save-btn" onclick="saveInvoice()">
                        <i class="fas fa-save"></i> Lưu hóa đơn
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="add-invoice.js"></script>
</body>
</html>
